<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>配信停止｜精密デバイス診断 Pro Ultra</title>
  <style>
    :root {
      --bg: #0a0a0a; --surface: #111; --border: #1e1e1e;
      --text: #e0e0e0; --text-muted: #888; --text-dim: #555;
      --accent: #6366f1; --accent2: #a78bfa;
      --warning: #ff9500; --danger: #ff6b6b; --success: #34c759;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.7; }
    .site-header { background: rgba(5,5,5,0.97); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 14px 20px; position: sticky; top: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; }
    .site-header a { color: var(--accent2); text-decoration: none; font-size: 0.85rem; font-weight: 700; }
    .site-title { font-size: 0.9rem; font-weight: 900; color: #fff; }
    .container { max-width: 520px; margin: 0 auto; padding: 40px 20px 80px; }
    .page-hero { text-align: center; margin-bottom: 32px; }
    .page-hero .icon { font-size: 3rem; margin-bottom: 12px; }
    .page-hero h1 { font-size: 1.5rem; font-weight: 900; color: #fff; margin-bottom: 8px; }
    .page-hero p { color: var(--text-muted); font-size: 0.88rem; }
    .section { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 28px; margin-bottom: 24px; }
    label { display: block; font-size: 0.8rem; color: var(--text-muted); font-weight: 700; margin-bottom: 6px; }
    input[type="email"] {
      width: 100%; padding: 12px 14px; background: #1a1a1a; border: 1px solid var(--border);
      border-radius: 12px; color: var(--text); font-size: 0.92rem; margin-bottom: 16px;
    }
    input[type="email"]:focus { outline: none; border-color: var(--accent); }
    button.primary {
      width: 100%; padding: 14px; border-radius: 14px; border: none; cursor: pointer;
      background: linear-gradient(135deg,#6366f1,#a78bfa); color: #fff; font-size: 0.95rem; font-weight: 800;
    }
    button.primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .status { margin-top: 16px; font-size: 0.85rem; text-align: center; min-height: 20px; }
    .status.success { color: var(--success); }
    .status.error { color: var(--danger); }
    .status.info { color: var(--text-muted); }
    .note { color: var(--text-dim); font-size: 0.78rem; margin-top: 18px; text-align: center; }
    .back-top { display: block; text-align: center; margin-top: 32px; color: var(--text-dim); font-size: 0.82rem; text-decoration: none; }
    .back-top:hover { color: var(--accent2); }
    .done-icon { font-size: 2.6rem; text-align: center; margin-bottom: 8px; }
  </style>
</head>
<body>

<header class="site-header">
  <span class="site-title">📱 精密デバイス診断 Pro Ultra</span>
  <a href="index.html">← アプリに戻る</a>
</header>

<div class="container">
  <div class="page-hero">
    <div class="icon">✉️</div>
    <h1>メール配信の停止</h1>
    <p>登録メールアドレスへの配信を停止します</p>
  </div>

  <div class="section" id="form-section">
    <label for="email-input">メールアドレス</label>
    <input type="email" id="email-input" placeholder="例: example@example.com" autocomplete="email">
    <button class="primary" id="unsub-btn" onclick="doUnsubscribe()">配信を停止する</button>
    <div class="status" id="status"></div>
    <p class="note">※ アプリ自体の利用は引き続き可能です。お知らせメールのみ停止されます。</p>
  </div>

  <a href="index.html" class="back-top">← アプリに戻る</a>
</div>

<script src="https://www.gstatic.com/firebasejs/11.9.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/11.9.0/firebase-firestore-compat.js"></script>
<script>
  const FIREBASE_CONFIG = {
    apiKey: "AIzaSyCjf0ASjsOctpSoNbBy9517Gb1cokT4jdg",
    authDomain: "prp-ultra.firebaseapp.com",
    projectId: "prp-ultra",
    storageBucket: "prp-ultra.firebasestorage.app",
    messagingSenderId: "892784070484",
    appId: "1:892784070484:web:a3aa47aaece7df862a02c1",
    measurementId: "G-X38W2QE5V4",
  };
  firebase.initializeApp(FIREBASE_CONFIG);
  const db = firebase.firestore();

  // URLパラメータにemailがあれば自動入力
  const params = new URLSearchParams(window.location.search);
  const prefillEmail = params.get('email');
  if (prefillEmail) {
    document.getElementById('email-input').value = prefillEmail;
  }

  async function doUnsubscribe() {
    const input = document.getElementById('email-input');
    const btn = document.getElementById('unsub-btn');
    const status = document.getElementById('status');
    const email = (input.value || '').trim().toLowerCase();

    status.className = 'status';
    status.textContent = '';

    if (!email || !email.includes('@')) {
      status.className = 'status error';
      status.textContent = '⚠️ 正しいメールアドレスを入力してください';
      return;
    }

    btn.disabled = true;
    btn.textContent = '処理中...';

    try {
      const snapshot = await db.collection('emails').where('email', '==', email).get();

      if (snapshot.empty) {
        status.className = 'status error';
        status.textContent = '⚠️ このメールアドレスは登録されていません';
        btn.disabled = false;
        btn.textContent = '配信を停止する';
        return;
      }

      const batch = db.batch();
      snapshot.forEach(doc => {
        batch.set(doc.ref, {
          unsubscribed: true,
          unsubscribedAt: new Date().toISOString()
        }, { merge: true });
      });
      await batch.commit();

      document.getElementById('form-section').innerHTML = `
        <div class="done-icon">✅</div>
        <div style="text-align:center;color:#fff;font-weight:800;font-size:1rem;margin-bottom:6px;">配信を停止しました</div>
        <div style="text-align:center;color:var(--text-muted);font-size:0.85rem;">${email} へのメール配信を停止しました。<br>またメールを受け取りたい場合は、アプリ内の設定から再度ご連絡ください。</div>
      `;
    } catch (e) {
      console.error('unsubscribe error:', e);
      status.className = 'status error';
      status.textContent = '⚠️ エラーが発生しました。時間をおいて再度お試しください';
      btn.disabled = false;
      btn.textContent = '配信を停止する';
    }
  }
</script>

</body>
</html>
